<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Notebook Hub — Notebooks</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background: #121820; color: #e5e7eb; }
    body.loading { overflow: hidden; }
    h1, h2, h3, h4, h5 { color: #f9fafb; }
    .text-muted { color: #9ca3af !important; }
    header { border-bottom: 1px solid #2a3442; }
    footer { opacity: 0.6; color: #9ca3af; }
    a { color: #22d3ee; } a:hover { color: #67e8f9; }
    .btn-outline-light { color: #22d3ee; border-color: #22d3ee; }
    .btn-outline-light:hover { background-color: #22d3ee; color: #0b1220; }
    .btn-light { background-color: #e5e7eb; color: #111827; border: none; }

    .shelf { border: 1px solid #2a3442; border-radius: 14px; margin-bottom: 1rem; overflow: hidden; }
    .shelf summary {
      cursor: pointer; padding: 1rem 1.25rem;
      display: flex; justify-content: space-between; align-items: center;
      font-weight: 700; color: #f9fafb;
      background: linear-gradient(135deg,#1b2430,#111720);
      user-select: none;
    }
    .shelf summary::-webkit-details-marker { display: none; }
    .shelf summary span { color: #9ca3af; font-weight: 500; }
    .shelf-body { padding: 1.25rem; background: #141b24; }
    .grid { display: grid; gap: 1.1rem; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); }

    .notebook-card {
      background: #1a202a;
      border: 1px solid #2d3746;
      border-radius: 14px;
      padding: 1.1rem;
      box-shadow: 0 14px 32px rgba(0,0,0,0.35);
    }

    .embed-container { display: none; margin-top: 0.9rem; }

    .book {
      background: #0f161f;
      border: 1px solid #223044;
      border-radius: 18px;
      padding: 14px;
    }

    .book__title {
      font-weight: 800;
      color: #22d3ee;
      margin-bottom: 8px;
      font-size: 0.95rem;
      text-transform: uppercase;
    }

    .frame { background: #101722; border-radius: 12px; padding: 8px; }

    .notebook-iframe {
      width: 100%;
      height: 60vh;
      border: none;
      border-radius: 10px;
      background: #fff;
    }

    #intro {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, #020617, #000);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      cursor: pointer;
    }

    #waveCanvas {
      position: absolute;
      width: 100%;
      height: 100%;
    }

    .intro-text {
      position: relative;
      color: #22d3ee;
      font-size: 1.5rem;
      letter-spacing: 0.2em;
      opacity: 0.85;
    }
  </style>
</head>

<body>

<div id="intro">
  <canvas id="waveCanvas"></canvas>
  <div class="intro-text">Entering Notebook Library</div>
</div>

<header class="container py-4 d-flex justify-content-between align-items-center">
  <h1 class="h4 m-0">Notebooks</h1>
  <a class="btn btn-outline-light btn-sm" href="index.html">Home</a>
</header>

<main class="container pb-5">
  <p class="text-muted">
    Welcome to a <strong>Jupyter Notebook library</strong>, built by Oliver Riba Fookes. Notebooks have been contributed by Lionel London, Oliver Riba Fookes, and Yusuf Ali-Khan.
  </p>
  <div id="shelves"></div>
</main>

<footer class="container py-4">
  Exported Jupyter notebooks (static HTML) served via GitHub Pages.
</footer>

<script>

const intro = document.getElementById('intro');

function isSafari() {
  const ua = navigator.userAgent;
  return /^((?!chrome|android).)*safari/i.test(ua);
}

if (isSafari()) {
  intro?.remove();
  document.body.classList.remove('loading');
  sessionStorage.setItem('seenIntro', 'true');
} else if (sessionStorage.getItem('seenIntro')) {
  intro?.remove();
} else {

  document.body.classList.add('loading');

  const canvas = document.getElementById('waveCanvas');
  const ctx = canvas?.getContext?.('2d');

  if (!canvas || !ctx) {
    intro.remove();
    document.body.classList.remove('loading');
  } else {

    let w, h;

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }

    resize();
    window.addEventListener('resize', resize);

    let t = 0;

    function draw() {
      try {
        ctx.fillStyle = "rgba(0,0,0,0.2)";
        ctx.fillRect(0, 0, w, h);

        const cx = w / 2;
        const cy = h / 2;

        for (let i = 0; i < 6; i++) {
          ctx.beginPath();

          let started = false;

          for (let a = 0; a < Math.PI * 2; a += 0.02) {
            const r = 80 + i * 30 + Math.sin(a * 4 + t + i) * 10;
            const x = cx + Math.cos(a) * r;
            const y = cy + Math.sin(a) * r;

            if (!started) {
              ctx.moveTo(x, y);
              started = true;
            } else {
              ctx.lineTo(x, y);
            }
          }

          ctx.closePath();
          ctx.strokeStyle = `rgba(34,211,238,${0.15 + i * 0.1})`;
          ctx.lineWidth = 1.5;
          ctx.stroke();
        }

        t += 0.02;
        requestAnimationFrame(draw);

      } catch (e) {}
    }

    requestAnimationFrame(draw);

    function closeIntro() {
      sessionStorage.setItem('seenIntro', 'true');

      intro.style.transition = "opacity 0.8s ease";
      intro.style.opacity = "0";

      setTimeout(() => {
        intro.remove();
        document.body.classList.remove('loading');
      }, 800);
    }

    setTimeout(closeIntro, 2000);
    intro.addEventListener('click', closeIntro);
  }
}

function escapeHtml(s) {
  return String(s||'').replace(/[&<>"']/g, m => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[m]));
}

function getNotebookUrl(item) {
  if (item?.notebooks?.[0]?.htmlUrl) return item.notebooks[0].htmlUrl;
  if (item?.filename) return `notebooks/${encodeURIComponent(item.filename)}`;
  return '';
}

function getPaperUrl(item) {
  if (item?.paperFilename) return `papers/${encodeURIComponent(item.paperFilename)}`;
  if (item?.paperUrl) return item.paperUrl;
  return '';
}

async function loadManifest() {
  try {
    const res = await fetch('notebooks/manifest.json');
    const manifest = await res.json();

    const shelvesEl = document.getElementById('shelves');
    const shelves = Array.isArray(manifest) ? manifest : [{name:"All",items:manifest}];

    shelves.forEach((shelf, i) => {
      const details = document.createElement('details');
      details.className = 'shelf';
      if (i === 0) details.open = true;

      details.innerHTML = `
        <summary>
          <div>${escapeHtml(shelf.name)}</div>
          <span>${shelf.items.length}</span>
        </summary>
        <div class="shelf-body"><div class="grid"></div></div>
      `;

      const grid = details.querySelector('.grid');
      shelvesEl.appendChild(details);

      shelf.items.forEach(item => {
        const card = document.createElement('div');
        card.className = 'notebook-card';

        card.innerHTML = `
          <h5>${escapeHtml(item.title)}</h5>
          <div class="text-muted">${escapeHtml(item.description || '')}</div>
        `;

        grid.appendChild(card);
      });
    });

  } catch (e) {}
}

loadManifest();

</script>

</body>
</html>
