<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notebook Library</title>
  <style>
    :root {
      --accent: #c37d3a;   /* swap to your existing accent if different */
      --bg: #0c0c0f;
      --text: #f2f2f2;
      --muted: #a6a6b0;
      --panel: rgba(255,255,255,0.04);
      --line: rgba(255,255,255,0.08);
      --paper: #f5f0e9;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.05), transparent 30%),
                  radial-gradient(circle at 80% 10%, rgba(255,255,255,0.04), transparent 28%),
                  var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header.page {
      padding: 2.5rem 1.5rem 1.25rem;
      text-align: center;
    }
    header.page h1 {
      margin: 0;
      letter-spacing: 0.04em;
      font-size: clamp(2rem, 3vw, 2.6rem);
    }
    header.page p { margin: 0.4rem 0 0; color: var(--muted); }

    main {
      width: min(1200px, 92vw);
      margin: 0 auto 3rem;
      display: grid;
      gap: 2rem;
    }

    .library {
      display: grid;
      gap: 1.75rem;
    }

    .shelf {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 18px 50px rgba(0,0,0,0.25);
      overflow: hidden;
    }

    .shelf__header {
      padding: 1.25rem 1.5rem 1rem;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.2));
    }
    .shelf__label {
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.75rem;
      color: var(--accent);
      margin-bottom: 0.2rem;
    }
    .shelf__title { margin: 0; font-size: 1.35rem; }
    .shelf__meta { margin: 0.15rem 0 0; color: var(--muted); font-size: 0.95rem; }

    .shelf__row {
      display: grid;
      grid-template-columns: 1.2fr 1.8fr;
      gap: 1rem;
      padding: 1rem 1.25rem 1.35rem;
    }

    .book-stack {
      display: grid;
      gap: 1rem;
    }

    .book {
      position: relative;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 16px 40px rgba(0,0,0,0.24);
      min-height: 260px;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .book__spine {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 12px;
      background: linear-gradient(90deg, var(--accent), rgba(0,0,0,0.35));
    }

    .book__cover {
      padding: 0.75rem 0.75rem 0.75rem 1.5rem;
      background: linear-gradient(145deg, rgba(255,255,255,0.02), rgba(0,0,0,0.25));
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 0.5rem;
    }

    .book__title {
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--accent);
      margin: 0;
      font-size: 1rem;
    }

    .book iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
      border-radius: 8px;
    }
    .book--paper iframe { background: var(--paper); }

    .fallback {
      background: rgba(0,0,0,0.4);
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 0.9rem;
      color: var(--muted);
      text-align: center;
      font-size: 0.95rem;
    }
    .fallback a { color: var(--accent); }

    .notice {
      padding: 1rem 1.25rem;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      color: var(--muted);
    }

    @media (max-width: 900px) {
      .shelf__row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="page">
    <h1>Notebook Library</h1>
    <p>Each “shelf” pairs a research paper with its companion Jupyter notebooks.</p>
  </header>

  <main>
    <section class="library" id="library"></section>
    <div class="notice" id="status" role="status" aria-live="polite"></div>
  </main>

  <script>
    async function loadLibrary() {
      const status = document.getElementById("status");
      const container = document.getElementById("library");

      try {
        status.textContent = "Loading shelves…";
        const res = await fetch("notebooks/manifest.json", { cache: "no-cache" });
        if (!res.ok) throw new Error("Could not fetch manifest");
        const papers = await res.json();

        if (!Array.isArray(papers) || papers.length === 0) {
          status.textContent = "No notebooks found. Add entries to notebooks/manifest.json.";
          return;
        }

        const shelves = papers.map(buildShelf).join("");
        container.innerHTML = shelves;
        status.textContent = "";
      } catch (err) {
        console.error(err);
        status.textContent = "Error loading library. Check console and manifest format.";
      }
    }

    function buildShelf(paper) {
      const {
        title = "Untitled Paper",
        authors = "",
        year = "",
        paperUrl = "",
        notebooks = []
      } = paper;

      const paperIframe = paperUrl
        ? `<iframe src="${paperUrl}" title="${title}" loading="lazy"
              onerror="this.replaceWith(fallbackLink('${paperUrl}','paper'))"></iframe>`
        : `<div class="fallback">No paper URL provided.</div>`;

      const notebookCards = (notebooks || []).map(nb => {
        const nbTitle = nb.title || "Notebook";
        const nbUrl   = nb.htmlUrl || nb.url || "";
        const iframeOrFallback = nbUrl
          ? `<iframe src="${nbUrl}" title="${nbTitle}" loading="lazy"
                onerror="this.replaceWith(fallbackLink('${nbUrl}','notebook'))"></iframe>`
          : `<div class="fallback">No notebook URL provided.</div>`;

        return `
          <div class="book book--notebook">
            <div class="book__spine"></div>
            <div class="book__cover">
              <header class="book__title">${nbTitle}</header>
              ${iframeOrFallback}
            </div>
          </div>`;
      }).join("");

      return `
        <article class="shelf">
          <header class="shelf__header">
            <div class="shelf__label">Research Paper</div>
            <h2 class="shelf__title">${title}</h2>
            <p class="shelf__meta">${[authors, year].filter(Boolean).join(" · ")}</p>
          </header>
          <div class="shelf__row">
            <div class="book book--paper">
              <div class="book__spine"></div>
              <div class="book__cover">
                <header class="book__title">Paper</header>
                ${paperIframe}
              </div>
            </div>
            <div class="book-stack">
              ${notebookCards || `<div class="fallback">No notebooks listed.</div>`}
            </div>
          </div>
        </article>`;
    }

    function fallbackLink(url, label) {
      const div = document.createElement("div");
      div.className = "fallback";
      div.innerHTML = `${label} wouldn’t load in an iframe. <a href="${url}" target="_blank" rel="noreferrer">Open in new tab</a>.`;
      return div;
    }

    loadLibrary();
  </script>
</body>
</html>
