<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Notebook Hub — Notebooks</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    /* ===== NEW THEME (your pasted style, cleaned + merged) ===== */

    body {
      background: #1f2933;
      color: #e5e7eb;
    }

    h1, h2, h3, h4, h5 {
      color: #f9fafb;
    }

    .text-muted {
      color: #9ca3af !important;
    }

    header {
      border-bottom: 1px solid #374151;
    }

    footer {
      opacity: 0.6;
      color: #9ca3af;
    }

    /* Grid layout */
    .grid {
      display: grid;
      gap: 1.5rem;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
    }

    /* Cards */
    .notebook-card {
      background: #2b3440;
      border: 1px solid #374151;
      border-radius: 14px;
      padding: 1.25rem;
      transition: all 0.2s ease;
    }

    .notebook-card:hover {
      transform: translateY(-4px);
      border-color: #22d3ee;
    }

    .note-desc {
      color: #9ca3af;
    }

    /* Embed preview */
    .embed-container {
      display: none;
      margin-top: 1rem;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #374151;
    }

    .notebook-iframe {
      width: 100%;
      height: 75vh;
      border: none;
      display: block;
      background: white;
    }

    /* Buttons */
    .btn-outline-light {
      color: #22d3ee;
      border-color: #22d3ee;
    }

    .btn-outline-light:hover {
      background-color: #22d3ee;
      color: #0b1220;
      border-color: #22d3ee;
    }

    .btn-light {
      background-color: #e5e7eb;
      color: #111827;
      border: none;
    }

    .btn-light:hover {
      background-color: #ffffff;
    }

    /* Links */
    a {
      color: #22d3ee;
    }

    a:hover {
      color: #67e8f9;
    }

  </style>
</head>

<body>

<header class="container py-4 d-flex justify-content-between align-items-center">
  <h1 class="h4 m-0">Notebooks</h1>
  <a class="btn btn-outline-light btn-sm" href="index.html">Home</a>
</header>

<main class="container pb-5">
  <p class="text-muted">
    Click <strong>Preview</strong> to expand a notebook inline, or open it in a full tab.
  </p>

  <div id="notebooksGrid" class="grid mt-4"></div>
</main>

<footer class="container py-4">
  Exported Jupyter notebooks (static HTML) served via GitHub Pages.
</footer>

<script>
async function loadManifest() {
  try {
    const res = await fetch('notebooks/manifest.json');
    if (!res.ok) throw new Error('Manifest not found');

    const manifest = await res.json();
    const grid = document.getElementById('notebooksGrid');

    manifest.forEach(item => {

      const card = document.createElement('div');
      card.className = 'notebook-card';

      card.innerHTML = `
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <h5 class="m-0">
              ${escapeHtml(item.title)}
            </h5>
            <div class="note-desc small mt-2">
              ${escapeHtml(item.description || '')}
            </div>
          </div>

          <div class="d-flex gap-2">
            <button class="btn btn-sm btn-outline-light preview-btn">
              Preview
            </button>

            <a class="btn btn-sm btn-light"
               href="notebooks/${encodeURIComponent(item.filename)}"
               target="_blank"
               rel="noopener">
              Open
            </a>
          </div>
        </div>

        <div class="embed-container">
          <iframe class="notebook-iframe"></iframe>
        </div>
      `;

      grid.appendChild(card);

      const previewBtn = card.querySelector('.preview-btn');
      const embedContainer = card.querySelector('.embed-container');
      const iframe = card.querySelector('iframe');

      previewBtn.addEventListener('click', () => {
        const isOpen = embedContainer.style.display === 'block';

        if (isOpen) {
          embedContainer.style.display = 'none';
          previewBtn.textContent = 'Preview';
        } else {
          embedContainer.style.display = 'block';
          previewBtn.textContent = 'Hide';

          if (!iframe.src) {
            iframe.src = `notebooks/${encodeURIComponent(item.filename)}`;
          }
        }
      });

    });

  } catch (err) {
    console.error(err);
    document.getElementById('notebooksGrid').innerHTML =
      '<div class="text-muted">No notebooks found. Make sure manifest.json exists inside /notebooks.</div>';
  }
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, function(m) {
    return {
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;'
    }[m];
  });
}

loadManifest();
</script>

</body>
</html>
